---
name: Deploy docs
on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  build-docs:
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a gh-pages deployment
    permissions:
      contents: write  # to let mkdocs write the new docs
      pages: write     # to deploy to Pages
      id-token: write  # allow to generate an OpenID Connect (OIDC) token

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # otherwise, you will fail to push refs to dest repo

      - name: Configure git for the bot
        # Gives the bot that commits to gh-pages a name & email address
        # so that the commits have an author in the commit log.
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      # https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.13
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # https://github.com/actions/setup-python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install just
        run: |
          uv tool install rust-just

      - name: Install dependencies
        run: uv sync --dev --no-progress

      # -----------------------------------------------------------------------
      # VERSION FREEZE (release tags only)
      #
      # Pins the dcatapplus prefix value from the unversioned base URL to
      # the concrete version that 'latest' currently resolves to, and pins
      # the chemdcatap prefix to the current release tag.  Also strips any
      # alias/version segment from dcatapplus import paths and converts bare
      # local imports to chemdcatap:schema/ form.
      #
      # All changes are applied to the working copy only — NOT committed to
      # git. Source files stay in their development form; every released
      # snapshot on GitHub Pages carries fully versioned, reproducible imports.
      # -----------------------------------------------------------------------
      - name: Freeze dcat-ap-plus import to current 'latest' version
        if: github.ref_type == 'tag' && github.event_name == 'push'
        run: |
          uv run python scripts/freeze_imports.py \
            --schema-dir src/chem_dcat_ap/schema \
            --dcatapplus-base https://w3id.org/nfdi-de/dcat-ap-plus \
            --versions-url https://nfdi-de.github.io/dcat-ap-plus/versions.json \
            --chemdcatap-base https://w3id.org/nfdi-de/dcat-ap-plus/chemistry \
            --chemdcatap-version ${{ github.ref_name }}

      - name: Generate schema documentation
        run: |
          just gen-doc

      # The if-conditions below make sure to select the right step, depending
      # on the job trigger. Only one of the steps below will run at a time.
      # The others will be skipped.

      - name: Check docs in pull requests with strict mode
        if: github.event_name == 'pull_request'
        run: |
          # XXX Enable strict mode once docs are clean
          echo "Strict check of docs disabled."
          # uv run mkdocs build --strict

      # yamllint disable rule:line-length
      - name: Build & deploy "dev" docs for a new commit to main
        if: (github.event_name == 'push' && github.ref_type != 'tag') || github.event_name == 'workflow_dispatch'
        run: |
          export SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          uv run mike deploy --push --update-aliases --title "dev (${SHORT_SHA})" dev

      # -----------------------------------------------------------------------
      # RELEASE DEPLOYMENT
      #
      # Always deploy the new version under its own path (e.g. /v0.2.0/).
      # Only promote to 'latest' when this version is semver >= the version
      # currently carrying the 'latest' alias.  This prevents a maintenance
      # patch on an old major branch (e.g. v1.10.4) from overwriting 'latest'
      # when a newer release (e.g. v2.0.1) is already live.
      # -----------------------------------------------------------------------
      - name: Build & deploy docs for a new version tag
        if: github.ref_type == 'tag' && github.event_name == 'push'
        run: |
          # Deploy under the version path (e.g. /v0.2.0/)
          uv run mike deploy --push --update-aliases ${{ github.ref_name }}

          # Check whether to also promote the 'latest' alias
          SHOULD_UPDATE=$(uv run python scripts/should_update_latest.py \
            --new-version ${{ github.ref_name }} \
            --versions-url https://nfdi-de.github.io/chem-dcat-ap/versions.json \
            2>/dev/null || echo "true")

          echo "Promote 'latest' alias: ${SHOULD_UPDATE}"

          if [ "${SHOULD_UPDATE}" = "true" ]; then
            uv run mike deploy --push --update-aliases ${{ github.ref_name }} latest
            uv run mike set-default latest --push
            echo "Updated 'latest' -> ${{ github.ref_name }}"
          else
            echo "Keeping 'latest' as-is (current latest is a newer version)."
          fi

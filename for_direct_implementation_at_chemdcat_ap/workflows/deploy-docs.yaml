---
name: Deploy docs
on:  # yamllint disable-line rule:truthy
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  build-docs:
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a gh-pages deployment
    permissions:
      contents: write  # to let mkdocs write the new docs
      pages: write     # to deploy to Pages
      id-token: write  # allow to generate an OpenID Connect (OIDC) token

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # otherwise, you will fail to push refs to dest repo

      - name: Configure git for the bot
        # Gives the bot that commits to gh-pages a name & email address
        # so that the commits have an author in the commit log.
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      # https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: 3.13
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # https://github.com/actions/setup-python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install just
        run: |
          uv tool install rust-just

      - name: Install dependencies
        run: uv sync --dev --no-progress

      - name: Generate schema documentation
        run: |
          just gen-doc

      # The if-conditions below make sure to select the right step, depending
      # on the job trigger. Only one of the steps below will run at a time.
      # The others will be skipped.

      - name: Check docs in pull requests with strict mode
        if: github.event_name == 'pull_request'
        run: |
          # XXX Enable strict mode once docs are clean
          echo "Strict check of docs disabled."
          # uv run mkdocs build --strict

      # yamllint disable rule:line-length
      - name: Build & deploy "dev" docs for a new commit to main
        if: (github.event_name == 'push' && github.ref_type != 'tag') || github.event_name == 'workflow_dispatch'
        run: |
          export SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          uv run mike deploy --push --update-aliases --title "dev (${SHORT_SHA})" dev

      # -----------------------------------------------------------------------
      # RELEASE DEPLOYMENT
      #
      # Always deploy the new version under its own path (e.g. /v0.2.0/).
      # Only promote to 'latest' when this version is semver >= the version
      # currently carrying the 'latest' alias.  This prevents a maintenance
      # patch on an old major branch (e.g. v1.10.4) from overwriting 'latest'
      # when a newer release (e.g. v2.0.1) is already live.
      # -----------------------------------------------------------------------
      - name: Build & deploy docs for a new version tag
        if: github.ref_type == 'tag' && github.event_name == 'push'
        run: |
          # Deploy under the version path (e.g. /v0.2.0/)
          uv run mike deploy --push --update-aliases ${{ github.ref_name }}

          # Check whether to also promote the 'latest' alias
          SHOULD_UPDATE=$(uv run python scripts/should_update_latest.py \
            --new-version ${{ github.ref_name }} \
            --versions-url https://nfdi-de.github.io/chem-dcat-ap/versions.json \
            2>/dev/null || echo "true")

          echo "Promote 'latest' alias: ${SHOULD_UPDATE}"

          if [ "${SHOULD_UPDATE}" = "true" ]; then
            uv run mike deploy --push --update-aliases ${{ github.ref_name }} latest
            uv run mike set-default latest --push
            echo "Updated 'latest' -> ${{ github.ref_name }}"
          else
            echo "Keeping 'latest' as-is (current latest is a newer version)."
          fi

  # -------------------------------------------------------------------------
  # POST-DEPLOY FULL FREEZE & VALIDATION (release tags only)
  #
  # Runs AFTER build-docs so that Phase 1 (raw schemas) is already live on
  # gh-pages — their versioned URLs now exist and CURIE imports can resolve.
  #
  # What this job does:
  #   1. Apply FULL freeze to working copy (no commit to main):
  #        a. chemdcatap: prefix → versioned gh-pages URL
  #        b. dcatapplus: prefix → re-verify / re-freeze
  #        c. id: fields → versioned w3id.org URL (all schemas)
  #        d. Sub-schema own-namespace prefixes → versioned w3id.org URLs
  #        e. Bare local imports → chemdcatap:schema/<name> CURIE form
  #   2. Validate the fully-frozen schemas with gen-yaml.
  #   3. Push frozen schemas to reference branch schema-release/{tag}
  #      (always — even on failure — so maintainers can inspect).
  #   4. On validation success: overwrite the raw gh-pages schema YAMLs with
  #      the frozen versions so downstream consumers get fully-resolved files.
  #   5. On failure: open a GitHub Issue to notify maintainers.
  # -------------------------------------------------------------------------
  post-deploy-validate:
    runs-on: ubuntu-latest
    needs: [build-docs]
    if: github.ref_type == 'tag' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git for the bot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --dev --no-progress

      # -----------------------------------------------------------------------
      # Apply the full freeze to the working copy only (not committed to main).
      # Converts bare local imports → CURIE form, versions all id: fields and
      # own-namespace prefixes, and re-pins chemdcatap: / dcatapplus:.
      # This is safe now because Phase 1 has already published the raw schemas
      # at their versioned gh-pages URLs, so the CURIE imports can resolve.
      #
      # Production note: --schema-id-old-base and --schema-id-new-base are both
      # the w3id.org base. The freeze function simply inserts the version token
      # into the existing canonical w3id.org namespace URLs.
      # -----------------------------------------------------------------------
      - name: Apply full freeze
        run: |
          uv run python scripts/freeze_imports.py \
            --schema-dir src/chem_dcat_ap/schema \
            --dcatapplus-base https://w3id.org/nfdi-de/dcat-ap-plus \
            --versions-url https://nfdi-de.github.io/dcat-ap-plus/versions.json \
            --chemdcatap-base https://nfdi-de.github.io/chem-dcat-ap/chemistry \
            --chemdcatap-version ${{ github.ref_name }} \
            --convert-bare-imports \
            --schema-id-old-base https://w3id.org/nfdi-de/dcat-ap-plus \
            --schema-id-new-base https://w3id.org/nfdi-de/dcat-ap-plus

      # -----------------------------------------------------------------------
      # Validate the frozen schemas.  gen-yaml resolves all imports via the
      # versioned gh-pages URLs — which now exist from Phase 1.
      # -----------------------------------------------------------------------
      - name: Validate fully-frozen schemas
        id: validate
        run: |
          echo "Validating fully-frozen schema files..."
          for f in src/chem_dcat_ap/schema/*.yaml; do
            echo "  checking: $f"
            uv run gen-yaml "$f" > /dev/null
          done
          echo "All frozen schemas are valid."

      # -----------------------------------------------------------------------
      # Push the frozen schemas to a reference branch for inspection.
      # Runs always (even on validation failure) so maintainers can inspect
      # the frozen state and debug any issues.
      # -----------------------------------------------------------------------
      - name: Push frozen schemas to reference branch
        if: always()
        run: |
          BRANCH="schema-release/${{ github.ref_name }}"
          git checkout -b "${BRANCH}"
          git add src/chem_dcat_ap/schema/
          git commit -m "chore: frozen schemas for ${{ github.ref_name }}

          Full-freeze snapshot generated by the post-deploy-validate workflow.
          Bare imports converted to CURIEs, id: and own-namespace prefixes
          versioned to w3id.org URLs.

          Source files on main are unchanged (development form retained)."
          git push origin "${BRANCH}"

      # -----------------------------------------------------------------------
      # Overwrite the raw gh-pages schema YAMLs with the fully-frozen versions.
      # Only runs on successful validation — a broken schema is never published
      # as the canonical frozen version.
      # -----------------------------------------------------------------------
      - name: Overwrite gh-pages schema files with frozen versions
        if: steps.validate.outcome == 'success'
        run: |
          # The frozen files are in the working tree (src/chem_dcat_ap/schema/).
          # Save them before switching branches.
          TMPDIR=$(mktemp -d)
          cp src/chem_dcat_ap/schema/*.yaml "${TMPDIR}/"

          git fetch origin gh-pages
          git checkout gh-pages

          TARGET_DIR="${{ github.ref_name }}/schema"
          if [ ! -d "${TARGET_DIR}" ]; then
            echo "ERROR: target directory '${TARGET_DIR}' not found on gh-pages."
            exit 1
          fi

          cp "${TMPDIR}"/*.yaml "${TARGET_DIR}/"
          git add "${TARGET_DIR}/"
          git commit -m "chore: update frozen schema YAMLs for ${{ github.ref_name }}

          Replaces raw Phase-1 schemas with fully-frozen versions (CURIEs,
          versioned id: and prefix fields). Generated by post-deploy-validate."
          git push origin gh-pages

          git checkout -

      # -----------------------------------------------------------------------
      # Notify maintainers when validation fails.
      # -----------------------------------------------------------------------
      - name: Open issue on validation failure
        if: failure()
        run: |
          gh issue create \
            --title "Schema post-deploy validation failed for ${{ github.ref_name }}" \
            --label "bug" \
            --body "$(cat <<'EOF'
          ## Post-deploy schema validation failed ❌

          The fully-frozen schemas for **${{ github.ref_name }}** failed \`gen-yaml\`
          validation after deploy.

          **What to check:**
          - Does the frozen schema have CURIE imports that resolve correctly?
          - Are there breaking changes in the upstream dcat-ap-plus release?

          **Reference branch for inspection:**
          \`schema-release/${{ github.ref_name }}\` — contains the frozen schema
          state at the time of failure.

          The gh-pages schema files were **not** overwritten; the raw (Phase 1)
          schemas remain live until this is resolved and a new release is made.

          ---
          *This issue was opened automatically by the \`post-deploy-validate\` job.*
          EOF
          )"

      - name: Job summary
        if: success()
        run: |
          echo "## Post-deploy validation passed ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Fully-frozen schemas for **${{ github.ref_name }}** are now live on gh-pages." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Reference branch: \`schema-release/${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
